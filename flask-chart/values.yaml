replicaCount: 2

image:
  repository: ghcr.io/fanninggh/flask-devops
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"

env:
  OTEL_SDK_DISABLED: "true"
  DATABASE_URL: "postgresql://user:pass@localhost/db"
  REDIS_URL: "redis://localhost:6379"

livenessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  path: /ready
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 5
