apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-devops
  namespace: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-devops
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: flask-devops
    spec:
      containers:
      - name: flask
        image: ghcr.io/fanninggh/flask-devops:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
