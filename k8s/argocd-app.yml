apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-devops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fanninggh/sre-flask-k8s
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: flask-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
