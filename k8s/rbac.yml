apiVersion: v1
kind: ServiceAccount
metadata:
  name: flask-sa
  namespace: flask-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flask-role
  namespace: flask-app
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flask-rolebinding
  namespace: flask-app
subjects:
- kind: ServiceAccount
  name: flask-sa
  namespace: flask-app
roleRef:
  kind: Role
  name: flask-role
  apiGroup: rbac.authorization.k8s.io
