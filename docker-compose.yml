version: '3.9'

services:

  web:
    build: .
    ports:
      - '5000:5000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://admin:localpassword123@db:5432/devops
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d devops']
      interval: 10s
      retries: 5
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
