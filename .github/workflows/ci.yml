name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 app.py tests/ --max-line-length 100

      - name: Test with coverage
        run: pytest --cov=app --cov-fail-under=80

  security:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t flask-devops:ci .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-devops:ci
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

  build-push:
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/fanninggh/flask-devops:latest
            ghcr.io/fanninggh/flask-devops:${{ github.sha }}
