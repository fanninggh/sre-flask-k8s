apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-devops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fanninggh/sre-flask-k8s
    targetRevision: main
    path: flask-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
